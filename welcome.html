<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Bootstrap Page</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark" style="padding: 10px;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">My Website</span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container text-center" style="margin-top: 50px;">
        
        <h1 style="color: #0d6efd;">Welcome</h1>
        <p style="font-size: 18px;">This is a simple page using Bootstrap and inline CSS.</p>

        <!-- Button -->
        <button class="btn btn-primary" style="margin-top: 20px;">
            Click Me
        </button>

        <!-- Card -->
        <div class="card mx-auto" style="width: 18rem; margin-top: 30px;">
            <div class="card-body">
                <h5 class="card-title">Card Title</h5>
                <p class="card-text">This is a simple Bootstrap card.</p>
                <a href="#" class="btn btn-success">Learn More</a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="text-center bg-dark text-white" style="margin-top: 50px; padding: 10px;">
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
